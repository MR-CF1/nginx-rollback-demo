name: Deploy Nginx

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t nginx-demo:latest .

      - name: Remove Old Container
        run: |
          docker rm -f nginx-demo || true

      - name: Start New Container
        run: |
          docker run -d \
            --name nginx-demo \
            -p 8082:80 \
            nginx-demo:latest
